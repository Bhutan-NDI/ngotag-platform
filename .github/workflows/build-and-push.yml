name: Build and Push to Azure ACR

on:
  push:
    branches:
      - pipeline-implementation
      - deployment
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'Dockerfiles/**'
  pull_request:
    branches:
      - pipeline-implementation
      - deployment
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list of services to build (e.g., api-gateway,user) or "all"'
        required: false
        default: 'all'
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      environment: ${{ steps.set-env.outputs.environment }}
      acr_name: ${{ steps.set-env.outputs.acr_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            BRANCH=${GITHUB_REF#refs/heads/}
            if [ "$BRANCH" == "pipeline-implementation" ]; then
              ENV="prod"
            else
              ENV="dev"
            fi
          fi
          
          if [ "$ENV" == "prod" ]; then
            ACR="phenixprodacr"
          else
            ACR="phenixdevacr"
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "acr_name=$ACR" >> $GITHUB_OUTPUT
          echo "Environment: $ENV, ACR: $ACR"

      - name: Detect changed services
        id: set-matrix
        run: |
          # Deployment order based on service dependencies (NATS message-based architecture)
          ALL_SERVICES="utility notification ledger agent-provisioning user organization agent-service connection ecosystem issuance verification webhook api-gateway"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.services }}" != "all" ]; then
            SERVICES="${{ github.event.inputs.services }}"
            SERVICES=$(echo $SERVICES | tr ',' ' ')
          elif [ "${{ github.event_name }}" == "push" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            SERVICES=""
            
            if echo "$CHANGED_FILES" | grep -q "^libs/"; then
              SERVICES="$ALL_SERVICES"
            else
              for svc in $ALL_SERVICES; do
                if echo "$CHANGED_FILES" | grep -q "^apps/$svc/\|^Dockerfiles/Dockerfile.$svc"; then
                  SERVICES="$SERVICES $svc"
                fi
              done
            fi
          else
            SERVICES="$ALL_SERVICES"
          fi
          
          SERVICES=$(echo $SERVICES | xargs)
          
          if [ -z "$SERVICES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            JSON_ARRAY=$(echo $SERVICES | tr ' ' '\n' | jq -R . | jq -s -c .)
            echo "matrix={\"service\":$JSON_ARRAY}" >> $GITHUB_OUTPUT
          fi
          
          echo "Services to build: $SERVICES"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ needs.detect-changes.outputs.acr_name }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          ENV="${{ needs.detect-changes.outputs.environment }}"
          ACR="${{ needs.detect-changes.outputs.acr_name }}"
          
          if [ "$ENV" == "prod" ]; then
            TAG="latest"
          else
            TAG="dev"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "acr_server=${ACR}.azurecr.io" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfiles/Dockerfile.${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.tag.outputs.acr_server }}/phenix-platform-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.acr_server }}/phenix-platform-${{ matrix.service }}:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: [detect-changes, build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: phenix-iac-manifests

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/phenix-iac-manifests
          token: ${{ steps.app-token.outputs.token }}
          path: manifests

      - name: Update image tags in kustomization
        run: |
          ENV="${{ needs.detect-changes.outputs.environment }}"
          ACR="${{ needs.detect-changes.outputs.acr_name }}"
          SHORT_SHA=${GITHUB_SHA::8}
          SERVICES='${{ needs.detect-changes.outputs.matrix }}'
          
          cd manifests/apps/$ENV
          
          # Parse the services that were built from the matrix
          BUILT_SERVICES=$(echo "$SERVICES" | jq -r '.service[]' 2>/dev/null || echo "")
          
          for svc in $BUILT_SERVICES; do
            echo "Processing service: $svc"
            
            # 1. Enable the service resource (uncomment if commented)
            if grep -q "# - \.\./base/phenix-platform/$svc\$" kustomization.yaml; then
              echo "Enabling service resource: $svc"
              sed -i "s|# - \.\./base/phenix-platform/$svc\$|  - ../base/phenix-platform/$svc|" kustomization.yaml
            fi
            
            # 2. Check if image entry exists
            if grep -q "phenix-platform-$svc" kustomization.yaml; then
              # Update existing image tag
              echo "Updating existing image tag for: $svc"
              sed -i "/phenix-platform-$svc/,/newTag:/s/newTag: .*/newTag: $SHORT_SHA/" kustomization.yaml
            else
              # Add new image entry before patches section
              echo "Adding new image entry for: $svc"
              # Find the line number of patches: and insert before it
              PATCHES_LINE=$(grep -n "^patches:" kustomization.yaml | cut -d: -f1)
              if [ -n "$PATCHES_LINE" ]; then
                sed -i "${PATCHES_LINE}i\\  - name: phenixdevacr.azurecr.io/phenix-platform-$svc\n    newName: ${ACR}.azurecr.io/phenix-platform-$svc\n    newTag: $SHORT_SHA" kustomization.yaml
              fi
            fi
          done
          
          echo "Updated kustomization.yaml:"
          cat kustomization.yaml

      - name: Commit and push
        run: |
          cd manifests
          ENV="${{ needs.detect-changes.outputs.environment }}"
          SERVICES='${{ needs.detect-changes.outputs.matrix }}'
          BUILT_SERVICES=$(echo "$SERVICES" | jq -r '.service | join(", ")' 2>/dev/null || echo "unknown")
          
          git config user.name "phenix-ci[bot]"
          git config user.email "phenix-ci[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "[$ENV] Update phenix-platform ($BUILT_SERVICES) to ${GITHUB_SHA::8}"
            git push
          else
            echo "No changes to commit"
          fi
