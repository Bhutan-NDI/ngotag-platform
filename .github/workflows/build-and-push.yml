name: Build and Push to Azure ACR

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - prod
          - dev
        default: 'prod'
      api-gateway:
        description: 'Build api-gateway'
        type: boolean
        default: false
      user:
        description: 'Build user'
        type: boolean
        default: false
      organization:
        description: 'Build organization'
        type: boolean
        default: false
      agent-provisioning:
        description: 'Build agent-provisioning'
        type: boolean
        default: false
      agent-service:
        description: 'Build agent-service'
        type: boolean
        default: false
      connection:
        description: 'Build connection'
        type: boolean
        default: false
      ecosystem:
        description: 'Build ecosystem'
        type: boolean
        default: false
      issuance:
        description: 'Build issuance'
        type: boolean
        default: false
      verification:
        description: 'Build verification'
        type: boolean
        default: false
      webhook:
        description: 'Build webhook'
        type: boolean
        default: false
      notification:
        description: 'Build notification'
        type: boolean
        default: false
      ledger:
        description: 'Build ledger'
        type: boolean
        default: false
      utility:
        description: 'Build utility'
        type: boolean
        default: false
      build_all:
        description: 'Build ALL services (overrides individual selections)'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      environment: ${{ steps.set-env.outputs.environment }}
      acr_name: ${{ steps.set-env.outputs.acr_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine environment
        id: set-env
        run: |
          ENV="${{ github.event.inputs.environment }}"
          
          if [ "$ENV" == "prod" ]; then
            ACR="phenixprodacr"
          else
            ACR="phenixdevacr"
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "acr_name=$ACR" >> $GITHUB_OUTPUT
          echo "Environment: $ENV, ACR: $ACR"

      - name: Build service list from inputs
        id: set-matrix
        run: |
          ALL_SERVICES="utility notification ledger agent-provisioning user organization agent-service connection ecosystem issuance verification webhook api-gateway"
          SERVICES=""
          
          # If build_all is selected, build everything
          if [ "${{ github.event.inputs.build_all }}" == "true" ]; then
            SERVICES="$ALL_SERVICES"
          else
            # Build services based on individual checkbox selections
            [ "${{ github.event.inputs.api-gateway }}" == "true" ] && SERVICES="$SERVICES api-gateway"
            [ "${{ github.event.inputs.user }}" == "true" ] && SERVICES="$SERVICES user"
            [ "${{ github.event.inputs.organization }}" == "true" ] && SERVICES="$SERVICES organization"
            [ "${{ github.event.inputs.agent-provisioning }}" == "true" ] && SERVICES="$SERVICES agent-provisioning"
            [ "${{ github.event.inputs.agent-service }}" == "true" ] && SERVICES="$SERVICES agent-service"
            [ "${{ github.event.inputs.connection }}" == "true" ] && SERVICES="$SERVICES connection"
            [ "${{ github.event.inputs.ecosystem }}" == "true" ] && SERVICES="$SERVICES ecosystem"
            [ "${{ github.event.inputs.issuance }}" == "true" ] && SERVICES="$SERVICES issuance"
            [ "${{ github.event.inputs.verification }}" == "true" ] && SERVICES="$SERVICES verification"
            [ "${{ github.event.inputs.webhook }}" == "true" ] && SERVICES="$SERVICES webhook"
            [ "${{ github.event.inputs.notification }}" == "true" ] && SERVICES="$SERVICES notification"
            [ "${{ github.event.inputs.ledger }}" == "true" ] && SERVICES="$SERVICES ledger"
            [ "${{ github.event.inputs.utility }}" == "true" ] && SERVICES="$SERVICES utility"
          fi
          
          SERVICES=$(echo $SERVICES | xargs)
          
          if [ -z "$SERVICES" ]; then
            echo "::error::No services selected! Please select at least one service to build."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            JSON_ARRAY=$(echo $SERVICES | tr ' ' '\n' | jq -R . | jq -s -c .)
            echo "matrix={\"service\":$JSON_ARRAY}" >> $GITHUB_OUTPUT
          fi
          
          echo "Services to build: $SERVICES"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ needs.detect-changes.outputs.acr_name }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          ENV="${{ needs.detect-changes.outputs.environment }}"
          ACR="${{ needs.detect-changes.outputs.acr_name }}"
          
          if [ "$ENV" == "prod" ]; then
            TAG="latest"
          else
            TAG="dev"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "acr_server=${ACR}.azurecr.io" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfiles/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.tag.outputs.acr_server }}/phenix-platform-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.acr_server }}/phenix-platform-${{ matrix.service }}:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: [detect-changes, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: phenix-iac-manifests

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/phenix-iac-manifests
          token: ${{ steps.app-token.outputs.token }}
          path: manifests

      - name: Update image tags in kustomization
        run: |
          ENV="${{ needs.detect-changes.outputs.environment }}"
          ACR="${{ needs.detect-changes.outputs.acr_name }}"
          SHORT_SHA=${GITHUB_SHA::8}
          SERVICES='${{ needs.detect-changes.outputs.matrix }}'
          
          cd manifests/apps/$ENV
          
          BUILT_SERVICES=$(echo "$SERVICES" | jq -r '.service[]' 2>/dev/null || echo "")
          
          for svc in $BUILT_SERVICES; do
            echo "Processing service: $svc"
            
            # 1. Enable the service resource (uncomment if commented) - fixed regex for proper indentation
            # Match "  # - ../base/phenix-platform/SERVICE" and replace with "  - ../base/phenix-platform/SERVICE"
            sed -i "s|^  # - \.\./base/phenix-platform/${svc}\$|  - ../base/phenix-platform/${svc}|" kustomization.yaml
            
            # 2. Check if image entry exists
            if grep -q "phenix-platform-$svc" kustomization.yaml; then
              echo "Updating existing image tag for: $svc"
              sed -i "/phenix-platform-$svc/,/newTag:/s/newTag: .*/newTag: $SHORT_SHA/" kustomization.yaml
            else
              echo "Adding new image entry for: $svc"
              # Insert image entry before patches section
              sed -i "/^patches:/i\\  - name: phenixdevacr.azurecr.io/phenix-platform-$svc\\n    newName: ${ACR}.azurecr.io/phenix-platform-$svc\\n    newTag: $SHORT_SHA" kustomization.yaml
            fi
          done
          
          echo "Updated kustomization.yaml:"
          head -60 kustomization.yaml

      - name: Commit and push
        run: |
          cd manifests
          ENV="${{ needs.detect-changes.outputs.environment }}"
          SERVICES='${{ needs.detect-changes.outputs.matrix }}'
          BUILT_SERVICES=$(echo "$SERVICES" | jq -r '.service | join(", ")' 2>/dev/null || echo "unknown")
          
          git config user.name "phenix-ci[bot]"
          git config user.email "phenix-ci[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "[$ENV] Update phenix-platform ($BUILT_SERVICES) to ${GITHUB_SHA::8}"
            git push
          else
            echo "No changes to commit"
          fi
