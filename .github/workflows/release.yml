name: Release to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_DEV: phenixdevacr
  ACR_PROD: phenixprodacr

jobs:
  promote-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user
          - organization
          - connection
          - issuance
          - ledger
          - verification
          - agent-provisioning
          - agent-service
          - ecosystem
          - webhook
          - notification
          - utility
    
    steps:
      - name: Get tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Import image from Dev ACR to Prod ACR
        run: |
          SERVICE="${{ matrix.service }}"
          TAG="${{ steps.tag.outputs.tag }}"
          
          # Use ACR import to copy image between registries (more efficient than pull/push)
          az acr import \
            --name ${{ env.ACR_PROD }} \
            --source ${{ env.ACR_DEV }}.azurecr.io/phenix-platform-${SERVICE}:latest \
            --image phenix-platform-${SERVICE}:${TAG} \
            --force
          
          az acr import \
            --name ${{ env.ACR_PROD }} \
            --source ${{ env.ACR_DEV }}.azurecr.io/phenix-platform-${SERVICE}:latest \
            --image phenix-platform-${SERVICE}:latest \
            --force

  update-prod-manifests:
    needs: promote-images
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/phenix-iac-manifests
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifests

      - name: Update prod image tags
        run: |
          cd manifests/apps/prod
          TAG="${{ steps.tag.outputs.tag }}"
          
          SERVICES="api-gateway user organization connection issuance ledger verification agent-provisioning agent-service ecosystem webhook notification utility"
          
          for svc in $SERVICES; do
            sed -i "/phenix-platform-$svc/,/newTag:/s/newTag: .*/newTag: $TAG/" kustomization.yaml
          done

      - name: Commit and push
        run: |
          cd manifests
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "[prod] Release ${TAG} - Promote all phenix-platform services"
            git push
          fi
